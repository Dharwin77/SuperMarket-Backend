<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invoice INV789456 - SmartRetail</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: #f5f5f5;
            padding: 20px;
        }

        .invoice-container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 40px;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 3px solid #25D366;
        }

        .store-name {
            font-size: 32px;
            font-weight: bold;
            color: #333;
        }

        .invoice-number {
            font-size: 24px;
            color: #25D366;
            font-weight: bold;
        }

        .customer-info {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
        }

        .customer-info h3 {
            margin-bottom: 10px;
            color: #333;
        }

        .info-row {
            display: flex;
            margin-bottom: 8px;
        }

        .label {
            font-weight: bold;
            width: 150px;
            color: #666;
        }

        .value {
            color: #333;
        }

        .items-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 30px;
        }

        .items-table th {
            background: #25D366;
            color: white;
            padding: 12px;
            text-align: left;
            font-weight: 600;
        }

        .items-table td {
            padding: 12px;
            border-bottom: 1px solid #dee2e6;
        }

        .items-table tr:hover {
            background: #f8f9fa;
        }

        .text-right {
            text-align: right;
        }

        .total-section {
            display: flex;
            justify-content: flex-end;
            margin-top: 20px;
        }

        .total-box {
            background: #25D366;
            color: white;
            padding: 20px 40px;
            border-radius: 8px;
            font-size: 24px;
            font-weight: bold;
        }

        .footer {
            margin-top: 40px;
            padding-top: 20px;
            border-top: 2px solid #dee2e6;
            text-align: center;
            color: #666;
        }

        .thank-you {
            font-size: 18px;
            font-weight: bold;
            color: #25D366;
            margin-bottom: 10px;
        }

        .download-btn {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 30px;
            background: #25D366;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            font-size: 16px;
        }

        .download-btn:hover {
            background: #128C7E;
        }

        @media print {
            body {
                background: white;
                padding: 0;
            }
            .invoice-container {
                box-shadow: none;
                padding: 20px;
            }
            .download-btn {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="invoice-container">
        <!-- Header -->
        <div class="header">
            <div class="store-name">SmartRetail</div>
            <div class="invoice-number">INV789456</div>
        </div>

        <!-- Customer Information -->
        <div class="customer-info">
            <h3>Bill To:</h3>
            <div class="info-row">
                <span class="label">Customer Name:</span>
                <span class="value">Dharwin S</span>
            </div>
            <div class="info-row">
                <span class="label">WhatsApp:</span>
                <span class="value">+91 8072126400</span>
            </div>
            <div class="info-row">
                <span class="label">Date:</span>
                <span class="value">December 15, 2025</span>
            </div>
        </div>

        <!-- Items Table -->
        <table class="items-table">
            <thead>
                <tr>
                    <th>Item</th>
                    <th class="text-right">Quantity</th>
                    <th class="text-right">Price</th>
                    <th class="text-right">Total</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>Milk</td>
                    <td class="text-right">2</td>
                    <td class="text-right">₹40</td>
                    <td class="text-right">₹80</td>
                </tr>
                <tr>
                    <td>Biscuit</td>
                    <td class="text-right">1</td>
                    <td class="text-right">₹30</td>
                    <td class="text-right">₹30</td>
                </tr>
                <tr>
                    <td>Soap</td>
                    <td class="text-right">3</td>
                    <td class="text-right">₹30</td>
                    <td class="text-right">₹90</td>
                </tr>
            </tbody>
        </table>

        <!-- Total -->
        <div class="total-section">
            <div class="total-box">
                Total: ₹200
            </div>
        </div>

        <!-- Footer -->
        <div class="footer">
            <div class="thank-you">Thank you for shopping with us!</div>
            <p>SmartRetail - Your trusted store</p>
            <button class="download-btn" onclick="window.print()">Print Invoice</button>
        </div>
    </div>
</body>
</html>
